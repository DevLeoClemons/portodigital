<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    .post {
      position: relative;
      width: 1080px;
      height: 1080px;
    }

    /* Background image */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{IMAGE_URL}}');
      background-size: cover;
      background-position: center;
    }

    /* Subtle dark gradient overlay — bottom-heavy */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.05) 0%,
        rgba(0, 0, 0, 0.10) 40%,
        rgba(0, 0, 0, 0.65) 100%
      );
    }

    /* Content pinned to bottom-left */
    .content {
      position: absolute;
      bottom: 72px;
      left: 72px;
      right: 72px;
    }

    .tag {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 20px;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: 68px;
      line-height: 1.08;
      color: #ffffff;
      max-width: 820px;
    }

    /* Thin white line separator */
    .divider {
      width: 48px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.5);
      margin-top: 36px;
    }

    /* Watermark top-right */
    .brand {
      position: absolute;
      top: 52px;
      right: 60px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="bg"></div>
    <div class="overlay"></div>

    <span class="brand">{{BRAND}}</span>

    <div class="content">
      <span class="tag">{{TAG}}</span>
      <h1 class="headline">{{IMAGE_TEXT}}</h1>
      <div class="divider"></div>
    </div>
  </div>
</body>
</html>
